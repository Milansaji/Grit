<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grit Auth + Blog</title>

  <style>
    body {
      background: #0f172a;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1, h2 { text-align: center; }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #020617;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-green { background: #22c55e; }
    .btn-blue  { background: #3b82f6; }
    .btn-red   { background: #ef4444; }
    .btn-gray  { background: #64748b; }

    .blogs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .blog {
      background: #020617;
      padding: 15px;
      border-radius: 8px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .hidden { display: none; }
    .error { color: #ef4444; text-align:center; }
  </style>
</head>
<body>

<h1>🔥 Grit Blog</h1>

<div class="container">

  <!-- AUTH -->
  <div id="auth" class="card">
    <h2 id="authTitle">Sign In</h2>

    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button class="btn-green" id="authBtn">Sign In</button>

    <p id="authMsg" class="error"></p>

    <p style="text-align:center; cursor:pointer; color:#60a5fa" id="toggleAuth">
      Don't have an account? Sign up
    </p>
  </div>

  <!-- BLOG -->
  <div id="blog" class="hidden">

    <div class="card">
      <h2 id="formTitle">Create Blog</h2>

      <input type="hidden" id="blogId" />
      <input id="title" placeholder="Title" />
      <input id="slug" placeholder="Slug" />
      <input id="thumbnail" placeholder="Thumbnail URL" />
      <textarea id="content" placeholder="Content"></textarea>

      <button class="btn-green" id="blogBtn">Create</button>
      <button class="btn-gray hidden" id="cancelBtn">Cancel</button>

      <button class="btn-red" onclick="logout()" style="float:right">Logout</button>
    </div>

    <div class="blogs" id="blogs"></div>
  </div>

</div>

<script>
/* =========================
   HELPERS
========================= */
function parseJwt(token) {
  try {
    const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(atob(base64));
  } catch {
    return null;
  }
}

function authFetch(url, options = {}) {
  return fetch(url, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + localStorage.getItem("token")
    }
  });
}

/* =========================
   API
========================= */
const SIGNIN_API = "http://localhost:8080/signin";
const SIGNUP_API = "http://localhost:8080/signup";
const BLOGS_API  = "http://localhost:8080/blogs";
const BLOG_API   = "http://localhost:8080/blog";

/* =========================
   DOM
========================= */
const authSection = document.getElementById("auth");
const blogSection = document.getElementById("blog");
const blogsDiv = document.getElementById("blogs");

let isSignup = false;

/* =========================
   INIT
========================= */
if (localStorage.getItem("token")) showBlog();

/* =========================
   AUTH
========================= */
document.getElementById("toggleAuth").onclick = () => {
  isSignup = !isSignup;
  authTitle.innerText = isSignup ? "Sign Up" : "Sign In";
  authBtn.innerText = isSignup ? "Create Account" : "Sign In";
  toggleAuth.innerText = isSignup
    ? "Already have an account? Sign in"
    : "Don't have an account? Sign up";
};

authBtn.onclick = async () => {
  authMsg.innerText = "";

  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  if (!email || !password) {
    authMsg.innerText = "Email and password required";
    return;
  }

  const res = await fetch(isSignup ? SIGNUP_API : SIGNIN_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  if (!res.ok) {
    authMsg.innerText = data.message || "Auth failed";
    return;
  }

  const decoded = parseJwt(data.token);
  localStorage.setItem("token", data.token);
  localStorage.setItem("user_id", decoded.sub);

  showBlog();
};

function logout() {
  localStorage.clear();
  location.reload();
}

function showBlog() {
  authSection.classList.add("hidden");
  blogSection.classList.remove("hidden");
  loadBlogs();
}

/* =========================
   BLOG CRUD
========================= */
async function loadBlogs() {
  const res = await authFetch(BLOGS_API);
  const json = await res.json();
  blogsDiv.innerHTML = "";

  const myUserId = localStorage.getItem("user_id");

  (json.data || []).forEach(b => {
    const isOwner = b.user_id === myUserId;

    blogsDiv.innerHTML += `
      <div class="blog">
        ${b.thumbnail ? `<img src="${b.thumbnail}" style="width:100%">` : ""}
        <h3>${b.title}</h3>
        <p>${b.content}</p>

        ${
          isOwner
            ? `<div class="actions">
                 <button class="btn-blue" onclick='editBlog(${JSON.stringify(b)})'>Edit</button>
                 <button class="btn-red" onclick='deleteBlog("${b.id}")'>Delete</button>
               </div>`
            : `<small style="opacity:.6">Read only</small>`
        }
      </div>
    `;
  });
}

blogBtn.onclick = async () => {
  const payload = {
    title: title.value,
    slug: slug.value,
    content: content.value,
    thumbnail: thumbnail.value,
    is_published: true
  };

  if (blogId.value) {
    payload.id = blogId.value;
    await authFetch(BLOG_API, { method: "PUT", body: JSON.stringify(payload) });
  } else {
    await authFetch(BLOGS_API, { method: "POST", body: JSON.stringify(payload) });
  }

  resetForm();
  loadBlogs();
};

function editBlog(b) {
  if (b.user_id !== localStorage.getItem("user_id")) {
    alert("You can only edit your own blog");
    return;
  }

  blogId.value = b.id;
  title.value = b.title;
  slug.value = b.slug;
  content.value = b.content;
  thumbnail.value = b.thumbnail;

  formTitle.innerText = "Edit Blog";
  blogBtn.innerText = "Update";
  cancelBtn.classList.remove("hidden");
}

async function deleteBlog(id) {
  if (!confirm("Delete this blog?")) return;
  await authFetch(BLOG_API, {
    method: "DELETE",
    body: JSON.stringify({ id })
  });
  loadBlogs();
}

function resetForm() {
  blogId.value = "";
  title.value = "";
  slug.value = "";
  content.value = "";
  thumbnail.value = "";

  formTitle.innerText = "Create Blog";
  blogBtn.innerText = "Create";
  cancelBtn.classList.add("hidden");
}
</script>

</body>
</html>
